[build]
  command   = "npm run build"
  publish   = "dist"

[functions]
  directory      = "netlify/functions"
  node_bundler   = "esbuild"

# ── Scheduled Function — toutes les heures ──
[functions."poll-emails"]
  schedule = "0 * * * *"

# ── Redirections API → Netlify Functions ──
[[redirects]]
  from   = "/api/manual-poll"
  to     = "/.netlify/functions/manual-poll"
  status = 200

[[redirects]]
  from   = "/api/emails"
  to     = "/.netlify/functions/get-emails"
  status = 200

[[redirects]]
  from   = "/api/emails/*"
  to     = "/.netlify/functions/email-action"
  status = 200

[[redirects]]
  from   = "/api/guide"
  to     = "/.netlify/functions/upload-guide"
  status = 200

[[redirects]]
  from   = "/api/examples"
  to     = "/.netlify/functions/manage-examples"
  status = 200

[[redirects]]
  from   = "/api/rules"
  to     = "/.netlify/functions/manage-rules"
  status = 200

# ── SPA fallback (React Router) ──
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
